    function BannerSlider() {
      const [current, setCurrent] = useState(0);
      useEffect(() => {
        const timer = setInterval(() => setCurrent(p => (p + 1) % bannerImages.length), 3500);
        return () => clearInterval(timer);
      }, []);
      return (
        <div className="relative rounded-[10px] overflow-hidden h-full">

                <ImageWithFallback src={img} alt={`배너 ${i+1}`} className="w-full h-full object-cover" />

                  <p className="text-[12px] opacity-80 mt-0.5">지금 바로 상담 시작하기</p>

              </div>
            ))}
          </div>
          <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex items-center gap-1.5">
            {bannerImages.map((_, i) => (
              <button key={i} onClick={() => setCurrent(i)}

            ))}
          </div>
        </div>
      );
    }

      const [detailId, setDetailId] = useState(null);

      const navigate = (target, id) => {
        if (target === 'detail') { setDetailId(id); setPage('detail'); }
        else { setPage(target); setDetailId(null); }
      };

      if (page === "login") return <LoginPage navigate={navigate} />;
      if (page === "home")  return <HomePage navigate={navigate} />;
      if (page === "detail") return <DetailPage id={detailId} navigate={navigate} />;
      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
