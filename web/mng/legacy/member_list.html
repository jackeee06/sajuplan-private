  <script src="js/components/sidebar.js"></script>

  <script>
    // 초기화
    lucide.createIcons();
    if (typeof initDarkMode === 'function') initDarkMode();
    if (typeof initHeaderListeners === 'function') initHeaderListeners();

    // 툴팁 모바일 클릭 토글
    document.querySelectorAll('.tooltip-wrap').forEach(function(wrap) {
      wrap.addEventListener('click', function(e) {
        e.stopPropagation();
        var isActive = wrap.classList.contains('active');
        document.querySelectorAll('.tooltip-wrap.active').forEach(function(w) { w.classList.remove('active'); });
        if (!isActive) wrap.classList.add('active');
      });
    });
    document.addEventListener('click', function() {
      document.querySelectorAll('.tooltip-wrap.active').forEach(function(w) { w.classList.remove('active'); });
    });

    // 모달 함수
    function openModal(id) {
      const el = document.getElementById('modal-' + id);
      if (!el) return;
      el.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    }
    function closeModal(id) {
      const el = document.getElementById('modal-' + id);
      if (!el) return;
      el.classList.add('hidden');
      document.body.style.overflow = '';
    }

    function openMemberEdit(id) {
      openModal('member-edit');
    }
    function openDeleteConfirm(id, name) {
      document.getElementById('delete-message').innerHTML =
        '<strong>' + name + '</strong> 회원을 정말 삭제하시겠습니까?<br>삭제된 데이터는 복구할 수 없습니다.';
      openModal('delete-confirm');
    }
    function openDeleteSelected() {
      document.getElementById('delete-message').innerHTML =
        '선택한 회원을 정말 삭제하시겠습니까?<br>삭제된 데이터는 복구할 수 없습니다.';
      openModal('delete-confirm');
    }

    // ── 더미데이터 1000건 생성 ──
    (function() {
      var lastNames = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남','심','노','하','곽','성','차','주','우','구','민','도','라','마','방','석','제','진','변','추','연'];
      var firstNames = ['민준','서윤','하준','지유','도윤','서연','시우','하은','예준','지민','주원','수아','지호','다은','현우','채원','준서','지윤','건우','은서','유준','소율','승현','예은','태현','소윤','지환','수빈','은우','하린','성민','나은','재현','유진','우진','아린','승우','예린','동현','서영','정우','윤서','수현','지안','재윤','시은','은호','하윤','연우','나윤'];
      var domains = ['gmail.com','naver.com','daum.net','kakao.com','hanmail.net','outlook.com'];
      var subs = [
        {label:'프리미엄', cls:'bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400'},
        {label:'스탠다드', cls:'bg-green-50 dark:bg-green-500/10 text-green-700 dark:text-green-400'},
        {label:'무료', cls:'bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400'}
      ];
      var statuses = [
        {label:'활성', cls:'bg-green-50 dark:bg-green-500/10 text-green-700 dark:text-green-400'},
        {label:'비활성', cls:'bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400'},
        {label:'차단', cls:'bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400'}
      ];
      function pad(n){ return n<10?'0'+n:''+n; }
      function randPhone(){ return '010-'+pad(Math.floor(Math.random()*9000)+1000).replace(/^0/,'')+Math.floor(Math.random()*9000+1000)+'-'+Math.floor(Math.random()*9000+1000); }
      function randDate(){
        var y = Math.random()>0.5?2026:2025;
        var m = Math.floor(Math.random()*12)+1;
        var d = Math.floor(Math.random()*28)+1;
        return y+'.'+pad(m)+'.'+pad(d);
      }
      function romanize(str){
        var map={'김':'kim','이':'lee','박':'park','최':'choi','정':'jung','강':'kang','조':'cho','윤':'yoon','장':'jang','임':'lim','한':'han','오':'oh','서':'seo','신':'shin','권':'kwon','황':'hwang','안':'ahn','송':'song','류':'ryu','전':'jeon','홍':'hong','고':'ko','문':'moon','양':'yang','손':'son','배':'bae','백':'baek','허':'heo','유':'yoo','남':'nam','심':'shim','노':'noh','하':'ha','곽':'kwak','성':'sung','차':'cha','주':'joo','우':'woo','구':'ku','민':'min','도':'do','라':'ra','마':'ma','방':'bang','석':'seok','제':'je','진':'jin','변':'byun','추':'choo','연':'yeon'};
        return map[str]||str;
      }
      var tbody = document.querySelector('#memberTable tbody');
      for(var i=1;i<=1000;i++){
        var ln = lastNames[Math.floor(Math.random()*lastNames.length)];
        var fn = firstNames[Math.floor(Math.random()*firstNames.length)];
        var name = ln+fn;
        var email = romanize(ln)+fn.length+i+'@'+domains[Math.floor(Math.random()*domains.length)];
        var phone = '010-'+Math.floor(Math.random()*9000+1000)+'-'+Math.floor(Math.random()*9000+1000);
        var sub = subs[Math.floor(Math.random()*subs.length)];
        var st = statuses[i%10===0?2:(Math.random()>0.2?0:1)];
        var dt = randDate();
        var tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors';
        tr.innerHTML =
          '<td class="px-4 py-4 text-center"><input type="checkbox" class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-brand-500 focus:ring-brand-500/20"></td>'+
          '<td class="px-5 py-4 sm:px-6 text-sm text-gray-500 dark:text-gray-400">'+i+'</td>'+
          '<td class="px-5 py-4 sm:px-6"><div><p class="text-sm font-medium text-gray-800 dark:text-white">'+name+'</p><p class="text-xs text-gray-500 dark:text-gray-400">'+email+'</p></div></td>'+
          '<td class="px-5 py-4 sm:px-6 text-sm text-gray-500 dark:text-gray-400">'+phone+'</td>'+
          '<td class="px-5 py-4 sm:px-6"><span class="rounded-full px-2.5 py-0.5 text-xs font-medium '+sub.cls+'">'+sub.label+'</span></td>'+
          '<td class="px-5 py-4 sm:px-6 text-sm text-gray-500 dark:text-gray-400">'+dt+'</td>'+
          '<td class="px-5 py-4 sm:px-6"><span class="rounded-full px-2.5 py-0.5 text-xs font-medium '+st.cls+'">'+st.label+'</span></td>'+
          '<td class="px-5 py-4 sm:px-6"><div class="flex items-center justify-center gap-2">'+
            '<button onclick="openMemberEdit('+i+')" class="flex h-8 w-8 items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 text-gray-400 hover:text-brand-500 hover:border-brand-300 transition" title="수정"><i data-lucide="pencil" class="w-4 h-4"></i></button>'+
            '<button onclick="openDeleteConfirm('+i+',\''+name+'\')" class="flex h-8 w-8 items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 text-gray-400 hover:text-red-500 hover:border-red-300 transition" title="삭제"><i data-lucide="trash-2" class="w-4 h-4"></i></button>'+
          '</div></td>';
        tbody.appendChild(tr);
      }
    })();

    // DataTables 초기화
    $('#memberTable').DataTable({
      language: {
        lengthMenu: '_MENU_ 건씩',
        info: '_START_ - _END_ / 총 _TOTAL_건',
        infoEmpty: '데이터가 없습니다',
        infoFiltered: '(전체 _MAX_건 중 필터링)',
        zeroRecords: '검색 결과가 없습니다',
        emptyTable: '등록된 데이터가 없습니다',
        paginate: { first: '«', last: '»', next: '›', previous: '‹' }
      },
      pageLength: 10,
      lengthMenu: [10, 25, 50, 100],
      order: [[1, 'desc']],
      ordering: true,
      columnDefs: [
        { orderable: false, targets: [0, 7] }
      ],
      scrollX: true,
      pagingType: 'simple_numbers',
      dom: 'rt<"dt-bottom"<"dt-bottom-left"li>p>',
      drawCallback: function(settings) {
        lucide.createIcons();
        // 페이지 번호 최대 표시 개수 제한 (모바일 대응)
        limitPageButtons(this.api(), 5);
      }
    });

    // 페이지 버튼 수 제한 함수
    function limitPageButtons(api, maxButtons) {
      var paginate = $(api.table().container()).find('.dataTables_paginate');
      var buttons = paginate.find('.paginate_button').not('.previous,.next,.first,.last');
      var current = api.page();
      var totalPages = api.page.info().pages;
      if (totalPages <= maxButtons) return;

      var half = Math.floor(maxButtons / 2);
      var start = current - half;
      var end = current + half;
      if (start < 0) { end -= start; start = 0; }
      if (end >= totalPages) { start -= (end - totalPages + 1); end = totalPages - 1; }
      if (start < 0) start = 0;

      buttons.each(function(i) {
        var pageNum = parseInt($(this).text()) - 1;
        if (isNaN(pageNum)) { $(this).hide(); return; }
        if (pageNum < start || pageNum > end) {
          $(this).hide();
        } else {
          $(this).show();
        }
      });

      // 말줄임 표시
      paginate.find('.ellipsis-dot').remove();
      var ellipsis = '<span class="ellipsis-dot" style="display:inline-flex;align-items:center;padding:0 4px;color:#98a2b3;font-size:12px;">...</span>';
      if (start > 0) paginate.find('.previous').after(ellipsis);
      if (end < totalPages - 1) paginate.find('.next').before(ellipsis);
    }

    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Escape') return;
      document.querySelectorAll('[id^="modal-"]').forEach(function (modal) {
        if (!modal.classList.contains('hidden')) modal.classList.add('hidden');
      });
      document.body.style.overflow = '';
    });
  </script>
