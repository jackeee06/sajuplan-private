<header class="sticky top-0 z-[10000] flex w-full border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 transition-colors duration-200">
  <div class="flex grow items-center justify-between px-4 py-4">

    <div class="flex items-center gap-4">
      <button id="sidebar-toggle-btn" onclick="toggleSidebar()"
        class="flex h-10 w-10 items-center justify-center rounded-lg border border-gray-200
               dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:bg-gray-100
               dark:hover:bg-gray-800 hover:text-gray-700 dark:hover:text-gray-200 transition-colors shrink-0">
        <svg id="icon-hamburger" width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M0.583252 1C0.583252 0.585788 0.919038 0.25 1.33325 0.25H14.6666C15.0808 0.25 15.4166 0.585786 15.4166 1C15.4166 1.41421 15.0808 1.75 14.6666 1.75L1.33325 1.75C0.919038 1.75 0.583252 1.41422 0.583252 1ZM0.583252 11C0.583252 10.5858 0.919038 10.25 1.33325 10.25L14.6666 10.25C15.0808 10.25 15.4166 10.5858 15.4166 11C15.4166 11.4142 15.0808 11.75 14.6666 11.75L1.33325 11.75C0.919038 11.75 0.583252 11.4142 0.583252 11ZM1.33325 5.25C0.919038 5.25 0.583252 5.58579 0.583252 6C0.583252 6.41421 0.919038 6.75 1.33325 6.75L7.99992 6.75C8.41413 6.75 8.74992 6.41421 8.74992 6C8.74992 5.58579 8.41413 5.25 7.99992 5.25L1.33325 5.25Z"
            fill="currentColor" />
        </svg>
        <i id="icon-sidebar-close" data-lucide="x" class="hidden w-5 h-5"></i>
      </button>
      <a href="dashboard.html" class="lg:hidden">
        <span class="text-base sm:text-lg font-bold text-gray-800 dark:text-white tracking-tight">inxight</span>
      </a>
    </div>

    <div class="flex items-center gap-3 lg:gap-4">

      <!-- 다크모드 -->
      <button id="dark-mode-btn" onclick="toggleDarkMode()"
        class="flex h-10 w-10 items-center justify-center rounded-full border
               border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-500
               dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-700
               dark:hover:text-gray-200 transition-colors">
        <i id="icon-moon" data-lucide="moon" class="w-5 h-5"></i>
        <i id="icon-sun" data-lucide="sun" class="w-5 h-5 hidden"></i>
      </button>

      <!-- 관리자 메뉴 -->
      <div class="relative" id="user-wrapper">
        <button onclick="toggleDropdown('user')"
          class="flex items-center gap-2 text-gray-700 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">
          <div class="flex h-10 w-10 items-center justify-center rounded-full border
                   border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-500
                   dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-700
                   dark:hover:text-gray-200 transition-colors block md:hidden">
            <i data-lucide="user" class="w-5 h-5"></i>
          </div>
          <span class="text-sm font-medium hidden md:block">Admin</span>
          <i id="user-chevron" data-lucide="chevron-down"
            class="w-4 h-4 text-gray-500 dark:text-gray-400 transition-transform duration-200 hidden md:block"></i>
        </button>

        <div id="user-dropdown"
          class="hidden absolute right-0 mt-4 w-[240px] rounded-2xl border border-gray-200
                 dark:border-gray-700 bg-white dark:bg-gray-800 p-3 shadow-lg z-[9999]">
          <div class="px-1 pb-3 border-b border-gray-100 dark:border-gray-700 mb-3">
            <span class="block text-sm font-medium text-gray-800 dark:text-white">Admin</span>
            <span class="block text-xs text-gray-500 dark:text-gray-400 mt-0.5">admin@bridgestone.kr</span>
          </div>
          <ul class="flex flex-col gap-1 border-b border-gray-100 dark:border-gray-700 pb-3 mb-3">
            <li>
              <a href="dashboard.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium
                                  text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700
                                  hover:text-gray-900 dark:hover:text-white transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-gray-500 dark:text-gray-400"></i>
                대시보드
              </a>
            </li>
          </ul>
          <a href="login.html" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium
                         text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700
                         hover:text-gray-900 dark:hover:text-white transition-colors">
            <i data-lucide="log-out" class="w-5 h-5 text-gray-500 dark:text-gray-400"></i>
            로그아웃
          </a>
        </div>
      </div>

    </div>
  </div>
</header>
